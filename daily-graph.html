        // Bloomberg Entity Group Colors

        }

        function setActiveLayoutBtn(name) {
            document.querySelectorAll('.layout-btn').forEach(btn => {

            });
        }

        function layoutRadial(nodes, links) {
            const groups = {};
            nodes.forEach(n => {
                const g = n.group || 'other';
                if (!groups[g]) groups[g] = [];
                groups[g].push(n);
            });
            const groupKeys = Object.keys(groups);
            const W = Graph.width(), H = Graph.height();
            const outerRadius = Math.min(W, H) * 0.38;
            groupKeys.forEach((key, gi) => {
                const sectorAngle = (2 * Math.PI) / groupKeys.length;
                const sectorMid = gi * sectorAngle - Math.PI / 2 + sectorAngle / 2;
                const members = groups[key];
                const arcSpan = sectorAngle * 0.8;
                const rings = Math.max(1, Math.ceil(members.length / 5));
                const perRing = Math.ceil(members.length / rings);
                members.forEach((n, i) => {
                    const ring = Math.floor(i / perRing);
                    const ringR = outerRadius * (0.55 + ring * 0.25);
                    const posInRing = i % perRing;
                    const countInRing = Math.min(perRing, members.length - ring * perRing);
                    const angle = countInRing === 1
                        ? sectorMid
                        : sectorMid - arcSpan / 2 + (posInRing / (countInRing - 1)) * arcSpan;
                    n.fx = ringR * Math.cos(angle);
                    n.fy = ringR * Math.sin(angle);
                });
            });
        }

        function layoutCircular(nodes, links) {
            const degreeMap = {};
            nodes.forEach(n => { degreeMap[n.id] = 0; });
            links.forEach(l => {
                const sid = typeof l.source === 'object' ? l.source.id : l.source;
                const tid = typeof l.target === 'object' ? l.target.id : l.target;
                if (degreeMap[sid] != null) degreeMap[sid]++;
                if (degreeMap[tid] != null) degreeMap[tid]++;
            });
            const sorted = [...nodes].sort((a, b) => (degreeMap[b.id] || 0) - (degreeMap[a.id] || 0));
            const W = Graph.width(), H = Graph.height();
            const radius = Math.min(W, H) * 0.40;
            sorted.forEach((n, i) => {
                const angle = (i / sorted.length) * 2 * Math.PI - Math.PI / 2;
                n.fx = radius * Math.cos(angle);
                n.fy = radius * Math.sin(angle);
            });
        }

        function layoutHierarchical(nodes, links) {
            const degreeMap = {};
            const adjList = {};
            nodes.forEach(n => { degreeMap[n.id] = 0; adjList[n.id] = []; });
            links.forEach(l => {
                const sid = typeof l.source === 'object' ? l.source.id : l.source;
                const tid = typeof l.target === 'object' ? l.target.id : l.target;
                if (degreeMap[sid] != null) degreeMap[sid]++;
                if (degreeMap[tid] != null) degreeMap[tid]++;
                if (adjList[sid]) adjList[sid].push(tid);
                if (adjList[tid]) adjList[tid].push(sid);
            });
            const root = nodes.reduce((a, b) => (degreeMap[b.id] || 0) > (degreeMap[a.id] || 0) ? b : a).id;
            const levels = { [root]: 0 };
            const queue = [root];
            while (queue.length) {
                const curr = queue.shift();
                (adjList[curr] || []).forEach(nb => {
                    if (levels[nb] == null) { levels[nb] = levels[curr] + 1; queue.push(nb); }
                });
            }
            const maxLevel = Math.max(...Object.values(levels), 0);
            nodes.forEach(n => { if (levels[n.id] == null) levels[n.id] = maxLevel + 1; });
            const byLevel = {};
            nodes.forEach(n => { const lv = levels[n.id]; if (!byLevel[lv]) byLevel[lv] = []; byLevel[lv].push(n); });
            const numLevels = Object.keys(byLevel).length;
            const W = Graph.width(), H = Graph.height();
            const levelHeight = Math.min(H * 0.75 / Math.max(numLevels - 1, 1), 180);
            const totalHeight = (numLevels - 1) * levelHeight;
            Object.keys(byLevel).forEach(lv => {
                const nodesInLevel = byLevel[lv];
                const y = -totalHeight / 2 + Number(lv) * levelHeight;
                const totalWidth = W * 0.72;
                nodesInLevel.forEach((n, i) => {
                    n.fx = nodesInLevel.length === 1 ? 0 : -totalWidth / 2 + (i / (nodesInLevel.length - 1)) * totalWidth;
                    n.fy = y;
                });
            });
        }

        function layoutGrid(nodes, links) {
            const sorted = [...nodes].sort((a, b) => (b.size || b.val || 1) - (a.size || a.val || 1));
            const cols = Math.ceil(Math.sqrt(sorted.length));
            const W = Graph.width(), H = Graph.height();
            const rows = Math.ceil(sorted.length / cols);
            const cellW = Math.min(W * 0.72 / cols, 220);
            const cellH = Math.min(H * 0.72 / rows, 120);
            const startX = -(cols - 1) * cellW / 2;
            const startY = -(rows - 1) * cellH / 2;
            sorted.forEach((n, i) => {
                n.fx = startX + (i % cols) * cellW;
                n.fy = startY + Math.floor(i / cols) * cellH;
            });
        }

        function switchLayout(name) {
            currentLayout = name;
            setActiveLayoutBtn(name);
            if (!currentGraphData || !currentGraphData.nodes) return;
            const nodes = currentGraphData.nodes;
            const links = currentGraphData.links || [];
            if (name === 'force') {
                nodes.forEach(n => { delete n.fx; delete n.fy; });
                Graph.d3ReheatSimulation();
            } else {
                if (name === 'radial') layoutRadial(nodes, links);
                else if (name === 'circular') layoutCircular(nodes, links);
                else if (name === 'hier') layoutHierarchical(nodes, links);
                else if (name === 'grid') layoutGrid(nodes, links);
                Graph.graphData(currentGraphData);
                setTimeout(() => fitGraphToViewport(600), 80);
            }
        }

        function getLabelMetrics(node) {
            const label = ((node && node.id) ? String(node.id) : '');
            const fontSize = 16;
            const horizontalPadding = 28;
            const verticalPadding = 12;
            const estimatedTextWidth = label.length * fontSize * 0.95;
            const width = Math.max(84, estimatedTextWidth + horizontalPadding);
            const height = fontSize + verticalPadding;
            const radius = Math.ceil(Math.sqrt(width * width + height * height) / 2);
            return { width, height, radius, fontSize };
        }

        function updateHighlights() {
            highlightedNodes.clear();
            highlightedLinks.clear();

            if (activeFilters.size === 0 && !searchText) return;

            currentLinks.forEach(link => {
                const source = link.source;
                const target = link.target;

                // Keyword Match (OR logic: match ANY active filter)
                let keywordMatch = true;
                if (activeFilters.size > 0) {
                    keywordMatch = false;
                    if (link.tags && Array.isArray(link.tags)) {
                        if (link.tags.some(tag => activeFilters.has(tag))) keywordMatch = true;
                    }
                    if (link.label && activeFilters.has(link.label)) keywordMatch = true;
                }

                // Search Match
                const searchMatch = searchText ? 
                    (source.id.toLowerCase().includes(searchText.toLowerCase()) || target.id.toLowerCase().includes(searchText.toLowerCase())) 
                    : true;
                
                if (keywordMatch && searchMatch) {
                    highlightedLinks.add(link);
                    highlightedNodes.add(source);
                    highlightedNodes.add(target);
                }
            });
        }

        function triggerRenderUpdate() {
            Graph.nodeColor(Graph.nodeColor())
                 .linkColor(Graph.linkColor())
                 .linkWidth(Graph.linkWidth())
                 .linkDirectionalParticles(Graph.linkDirectionalParticles());
        }

        function estimateNodeRadius(node) {
            const weight = Number(node && (node.val ?? node.size)) || 1;
            const labelRadius = getLabelMetrics(node).radius;
            return Math.max(labelRadius, 26 + Math.sqrt(weight) * 7);
        }

        function seedNodePositions(nodes) {
            const count = Math.max(nodes.length, 1);
            const radius = Math.max(220, Math.sqrt(count) * 90);
            nodes.forEach((node, index) => {
                const angle = (index / count) * Math.PI * 2;
                const ringOffset = ((index % 5) - 2) * 18;
                node.x = (radius + ringOffset) * Math.cos(angle);
                node.y = (radius + ringOffset) * Math.sin(angle);
                node.vx = 0;
                node.vy = 0;
                delete node.fx;
                delete node.fy;
            });
        }

        function getViewportPadding() {
            const isMobile = window.matchMedia && window.matchMedia("(max-width: 768px)").matches;
            if (isMobile) return 48;
            return controlsPanel.classList.contains('hidden') ? 120 : 220;
        }

        function fitGraphToViewport(duration = 900) {
            if (!currentGraphData || !currentGraphData.nodes || currentGraphData.nodes.length === 0) return;
            requestAnimationFrame(() => {
                Graph.zoomToFit(duration, getViewportPadding(), node => Number.isFinite(node.x) && Number.isFinite(node.y));
                Graph.centerAt(0, 0, duration);
            });
        }

        function updateGraphSizeReadout() {
            const width = Math.round(graphContainer.clientWidth || window.innerWidth || 0);
            const height = Math.round(graphContainer.clientHeight || window.innerHeight || 0);
            const padding = getViewportPadding();
            graphSizeReadout.textContent = `graph: ${width} x ${height}\npadding: ${padding}`;
        }

        let Graph = ForceGraph()(graphContainer)
            .backgroundColor('#0A0A0A')
            .nodeId('id')
            .nodeRelSize(7)
            .warmupTicks(160)
            .cooldownTicks(240)
            .d3AlphaDecay(0.035)
            .d3VelocityDecay(0.22)
            .d3Force('charge', d3.forceManyBody().strength(node => -Math.max(1400, estimateNodeRadius(node) * 28)))
            .d3Force('link', d3.forceLink().id(d => d.id).distance(link => {
                const sourceRadius = estimateNodeRadius(link.source);
                const targetRadius = estimateNodeRadius(link.target);
                return Math.max(280, sourceRadius + targetRadius + 90);
            }).strength(0.9))
            .d3Force('collision', d3.forceCollide().radius(node => estimateNodeRadius(node) + 28).strength(1))
            .nodeColor(node => isNodeActive(node) ? getNodeColor(node) : 'rgba(255, 255, 255, 0.06)')
            .nodeLabel('id')
            .linkColor(link => isLinkActive(link) ? (link === focusOriginLink ? 'rgba(242, 101, 34, 0.7)' : 'rgba(0, 160, 210, 0.38)') : 'rgba(255, 255, 255, 0.05)')
            .linkWidth(link => isLinkActive(link) ? Math.max(1.4, link.value ? Math.sqrt(link.value) * 1.1 : 1.4) : 0.6)
            .linkDirectionalParticles(link => isLinkActive(link) ? 2 : 0)
            .linkDirectionalParticleWidth(2)
            .linkDirectionalParticleColor(() => '#F26522')
            .onEngineStop(() => fitGraphToViewport(700))
            .onNodeClick(node => { setNodeFocus(node); triggerRenderUpdate(); onNodeClick(node); })
            .onLinkClick(link => { setLinkFocus(link); triggerRenderUpdate(); showToast(link.label, link.reason || ''); })
            .onNodeDrag((node) => {
                if (typeof node.x === 'number' && typeof node.y === 'number' && Number.isFinite(node.x) && Number.isFinite(node.y)) {
                    lastDragPosition[node.id] = { x: node.x, y: node.y };
                }
            })
            .onNodeDragEnd((node) => {
                const pos = lastDragPosition[node.id];
                let x = (pos && Number.isFinite(pos.x)) ? pos.x : node.x;
                let y = (pos && Number.isFinite(pos.y)) ? pos.y : node.y;
                if (!Number.isFinite(x) || !Number.isFinite(y)) {
                    x = Number.isFinite(node.x) ? node.x : 0;
                    y = Number.isFinite(node.y) ? node.y : 0;
                }
                node.x = x;
                node.y = y;
                node.fx = x;
                node.fy = y;
                delete lastDragPosition[node.id];
            });
        if (typeof Graph.onBackgroundClick === 'function') {
            Graph.onBackgroundClick(() => {
                newsPanel.classList.remove('visible');
                clearFocus();
                triggerRenderUpdate();
            });
        }

        // Custom Link Label Rendering
        Graph.linkCanvasObject((link, ctx, globalScale) => {
            const start = link.source;
            const end = link.target;
            if (typeof start !== 'object' || typeof end !== 'object') return;
            const sx = start.x, sy = start.y, ex = end.x, ey = end.y;
            if (typeof sx !== 'number' || typeof sy !== 'number' || typeof ex !== 'number' || typeof ey !== 'number') return;
            if (!Number.isFinite(sx) || !Number.isFinite(sy) || !Number.isFinite(ex) || !Number.isFinite(ey)) return;
            const isHighlighted = isLinkActive(link);
            const isFocusOrigin = link === focusOriginLink;

            ctx.beginPath();
            ctx.moveTo(sx, sy);
            ctx.lineTo(ex, ey);
            ctx.strokeStyle = isHighlighted ? (isFocusOrigin ? 'rgba(242, 101, 34, 0.7)' : 'rgba(0, 160, 210, 0.38)') : 'rgba(255, 255, 255, 0.05)';
            ctx.lineWidth = (isHighlighted ? Math.max(1.4, link.value ? Math.sqrt(link.value) * 1.1 : 1.4) : 0.6) / globalScale;
            ctx.stroke();

            if (link.label && isHighlighted) {
                const label = link.label;
                const fontSize = Math.max(11, 15 / globalScale);
                ctx.font = `${fontSize}px 'Noto Sans TC', Sans-Serif`;
                const midX = (sx + ex) / 2;
                const midY = (sy + ey) / 2;
                const dx = ex - sx;
                const dy = ey - sy;
                const length = Math.sqrt(dx * dx + dy * dy) || 1;
                const offset = Math.min(18 / globalScale, length * 0.18);
                const labelX = midX + (-dy / length) * offset;
                const labelY = midY + (dx / length) * offset;
                const textWidth = ctx.measureText(label).width;
                const bckgDimensions = [textWidth, fontSize].map(n => n + fontSize * 0.45);
                ctx.fillStyle = 'rgba(8, 8, 8, 0.94)';
                ctx.fillRect(labelX - bckgDimensions[0] / 2, labelY - bckgDimensions[1] / 2, ...bckgDimensions);
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillStyle = isFocusOrigin ? '#F26522' : '#00A0D2';
                ctx.fillText(label, labelX, labelY);
            }
        });

        // Custom Node Rendering
        Graph.nodeCanvasObject((node, ctx, globalScale) => {
            const x = node.x, y = node.y;
            if (typeof x !== 'number' || typeof y !== 'number' || !Number.isFinite(x) || !Number.isFinite(y)) return;
            const isHighlighted = isNodeActive(node);
            const isFocusCenter = node === focusCenterNode;
            const label = node.id;
            const fontSize = Math.max(13, 18 / globalScale);
            ctx.font = `${fontSize}px 'Noto Sans TC', sans-serif`;
            const textWidth = ctx.measureText(label).width;
            const bckgDimensions = [
                textWidth + fontSize * 1.35,
                fontSize + fontSize * 0.9
            ];
            const boxX = x - bckgDimensions[0] / 2;
            const boxY = y - bckgDimensions[1] / 2;

            const groupColor = getNodeColor(node);
            ctx.fillStyle = isHighlighted ? 'rgba(10, 10, 10, 0.93)' : 'rgba(10, 10, 10, 0.18)';
            ctx.strokeStyle = isFocusCenter ? '#F26522' : (isHighlighted ? groupColor : 'rgba(50, 50, 50, 0.25)');
            ctx.lineWidth = (isFocusCenter ? 2.5 : isHighlighted ? 1.5 : 0.8) / globalScale;
            ctx.fillRect(boxX, boxY, ...bckgDimensions);
            ctx.strokeRect(boxX, boxY, ...bckgDimensions);
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillStyle = isHighlighted ? '#E8E8E8' : 'rgba(80, 80, 80, 0.55)';
            ctx.fillText(label, x, y);

            node.__bckgDimensions = bckgDimensions;
        })
        .nodePointerAreaPaint((node, color, ctx) => {
            const bckgDimensions = node.__bckgDimensions;
            if (bckgDimensions && typeof node.x === 'number' && typeof node.y === 'number') {
                ctx.fillStyle = color;
                ctx.fillRect(node.x - bckgDimensions[0] / 2, node.y - bckgDimensions[1] / 2, ...bckgDimensions);
            }
        });

        // Toast Logic
        let toastTimeout;
        function showToast(title, message) {
            if (!title) return;
            toast.innerHTML = `<h3>${title}</h3><p>${message || ''}</p>`;
            toast.style.display = 'block';
            if (toastTimeout) clearTimeout(toastTimeout);
            toastTimeout = setTimeout(() => { toast.style.display = 'none'; }, 5000);
        }

        // News Panel (entity -> related news)
        const newsPanel = document.getElementById('news-panel');
        const newsPanelTitle = document.getElementById('news-panel-title');
        const newsPanelList = document.getElementById('news-panel-list');
        document.querySelector('#news-panel .close-btn').addEventListener('click', () => { newsPanel.classList.remove('visible'); });

        // Left panel show/hide toggle
        const controlsPanel = document.getElementById('controls-panel');
        const controlsToggleTab = document.getElementById('controls-toggle-tab');
        document.getElementById('toggle-panel-btn').addEventListener('click', () => {
            controlsPanel.classList.add('hidden');
            controlsToggleTab.classList.add('visible');
            fitGraphToViewport(500);
            updateGraphSizeReadout();
        });
        controlsToggleTab.addEventListener('click', () => {
            controlsPanel.classList.remove('hidden');
            controlsToggleTab.classList.remove('visible');
            fitGraphToViewport(500);
            updateGraphSizeReadout();
        });

        function onNodeClick(node) {
            if (currentGraphData && currentGraphData.newsDatabase && currentGraphData.newsDatabase[node.id]) {
                const items = currentGraphData.newsDatabase[node.id];
                newsPanelTitle.textContent = node.id;
                const titleToUrl = currentGraphData.titleToUrl || {};
                newsPanelList.innerHTML = items.map(entry => {
                    const source = entry.source ? ` <span class="source">(${escapeHtml(entry.source)})</span>` : '';
                    const url = entry.url || titleToUrl[entry.title];
                    if (url) {
                        return `<div class="news-item"><a href="${escapeAttr(url)}" target="_blank" rel="noopener">${escapeHtml(entry.title)}</a>${source}</div>`;
                    }
                    return `<div class="news-item">${escapeHtml(entry.title)}${source}</div>`;
                }).join('');
                newsPanel.classList.add('visible');
            } else if (node.url) {
                window.open(node.url, '_blank');
            } else {
                showToast(node.id, '無相關新聞');
            }
        }
        function escapeHtml(s) {
            const div = document.createElement('div');
            div.textContent = s;
            return div.innerHTML;
        }
        function escapeAttr(s) {
            return String(s).replace(/&/g, '&amp;').replace(/"/g, '&quot;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
        }

        // --- Fetch Logic ---

        function getPreviousDate(dateStr, days) {
            const date = new Date(dateStr);
            date.setDate(date.getDate() - days);
            return date.toISOString().split('T')[0];
        }

        async function fetchHistory() {
            // Check previous 3 days
            for (let i = 1; i <= 3; i++) {
                const prevDate = getPreviousDate(TARGET_DATE, i);
                const filename = prevDate + ".json";
                try {
                    const response = await fetch(filename);
                    if (response.ok) {
                        const json = await response.json();
                        dataStore[prevDate] = json;
                        // Refresh selector
                        populateSelector();
                    }
                } catch (e) {
                    // Ignore fetch errors (likely local file system or missing file)
                    console.log(`Skipping ${filename}: ${e}`);
                }
            }
        }

        // Init Logic
        function init() {
            // On narrow viewport (e.g. mobile), start with left panel hidden so graph is full-screen
            if (window.matchMedia && window.matchMedia("(max-width: 768px)").matches) {
                controlsPanel.classList.add("hidden");
                controlsToggleTab.classList.add("visible");
            }
            populateSelector();

            // Load embedded default
            loadGraphData(TARGET_DATE);

            // Try to fetch history (if on server)
            fetchHistory();
        }

        function populateSelector() {
            // Clear existing options
            dateSelector.innerHTML = '<option value="" disabled>選擇日期...</option>';
            
            const sortedDates = Object.keys(dataStore).sort().reverse();
            sortedDates.forEach(date => {
                const option = document.createElement('option');
                option.value = date;
                option.textContent = date;
                if (date === dateSelector.value) option.selected = true;
                dateSelector.appendChild(option);
            });
            
            // If nothing selected, select first
            if (!dateSelector.value && sortedDates.length > 0) {
                dateSelector.value = sortedDates[0];
            }
        }
        
        function populateKeywords(links, nodes) {
            keywordList.innerHTML = '';
            const labels = new Set();
            (links || []).forEach(link => {
                if (link.tags && Array.isArray(link.tags)) {
                    link.tags.forEach(tag => labels.add(tag));
                }
                if (link.label) labels.add(link.label);
            });
            (nodes || []).forEach(node => {
                if (node.group) labels.add(node.group);
            });
            const sortedLabels = Array.from(labels).sort();
            sortedLabels.forEach(label => {
                const tag = document.createElement('div');
                tag.className = 'keyword-tag';
                tag.textContent = label;
                tag.onclick = () => toggleFilter(label, tag);
                keywordList.appendChild(tag);
            });
        }

        function toggleFilter(label, tagElement) {
            // Toggle Logic: Add or Remove
            if (activeFilters.has(label)) {
                activeFilters.delete(label);
                tagElement.classList.remove('active');
            } else {
                activeFilters.add(label);
                tagElement.classList.add('active');
            }
            
            updateHighlights();
            triggerRenderUpdate();
        }

        function loadGraphData(dateKey) {
            const graphData = dataStore[dateKey];
            if (graphData) {
                currentGraphData = graphData;
                currentLinks = graphData.links || [];
                activeFilters.clear();
                searchText = "";
                clearFocus();
                searchInput.value = "";
                updateHighlights();
                // Normalize node.val from node.size for compatibility (e.g. force-graph / rendering)
                const nodes = graphData.nodes || [];
                nodes.forEach((n) => {
                    if (n.size != null && n.val == null) n.val = n.size;
                });
                currentLayout = 'force';
                setActiveLayoutBtn('force');
                seedNodePositions(nodes);
                Graph.graphData(graphData);
                fitGraphToViewport(0);
                updateGraphSizeReadout();
                populateKeywords(graphData.links, graphData.nodes);
                dateSelector.value = dateKey;
            }
        }

        document.getElementById('layout-btn-group').addEventListener('click', e => {
            const btn = e.target.closest('.layout-btn');
            if (btn) switchLayout(btn.dataset.layout);
        });

        dateSelector.addEventListener('change', (e) => loadGraphData(e.target.value));
        searchInput.addEventListener('input', (e) => {
            searchText = e.target.value;
            updateHighlights();
            triggerRenderUpdate();
        });
        window.addEventListener('resize', () => {
            fitGraphToViewport(250);
            updateGraphSizeReadout();
        });
        new ResizeObserver(() => updateGraphSizeReadout()).observe(graphContainer);
        updateGraphSizeReadout();

        // Start
        init();

    </script>
</body>
</html>
