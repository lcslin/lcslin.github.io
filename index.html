<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SNAKE GAME - APPLE ][ TERMINAL</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=VT323&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'VT323', monospace;
            background: #000000;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            color: #33ff33;
        }

        /* CRT Screen Effect */
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(
                rgba(18, 16, 16, 0) 50%, 
                rgba(0, 0, 0, 0.25) 50%
            );
            background-size: 100% 4px;
            pointer-events: none;
            z-index: 1000;
            animation: flicker 0.15s infinite;
        }

        @keyframes flicker {
            0% { opacity: 0.97; }
            50% { opacity: 1; }
            100% { opacity: 0.97; }
        }

        .terminal-container {
            background: #001100;
            border: 4px solid #33ff33;
            border-radius: 0;
            padding: 20px;
            box-shadow: 
                0 0 20px rgba(51, 255, 51, 0.3),
                inset 0 0 30px rgba(0, 0, 0, 0.5);
            text-align: center;
            max-width: 700px;
            width: 100%;
            position: relative;
        }

        /* Scanline effect */
        .terminal-container::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(
                rgba(51, 255, 51, 0.03) 50%, 
                transparent 50%
            );
            background-size: 100% 2px;
            pointer-events: none;
        }

        /* Glow effect */
        .terminal-container::after {
            content: "";
            position: absolute;
            top: -2px;
            left: -2px;
            right: -2px;
            bottom: -2px;
            background: transparent;
            border: 2px solid rgba(51, 255, 51, 0.2);
            border-radius: 0;
            box-shadow: 0 0 40px rgba(51, 255, 51, 0.4);
            pointer-events: none;
        }

        h1 {
            color: #33ff33;
            margin-bottom: 15px;
            font-size: 3em;
            text-shadow: 
                0 0 10px #33ff33,
                0 0 20px #33ff33,
                0 0 30px #33ff33;
            letter-spacing: 0.1em;
            animation: glow 2s ease-in-out infinite alternate;
        }

        @keyframes glow {
            from { text-shadow: 0 0 10px #33ff33, 0 0 20px #33ff33; }
            to { text-shadow: 0 0 20px #33ff33, 0 0 30px #33ff33, 0 0 40px #33ff33; }
        }

        .boot-text {
            font-size: 1.2em;
            margin-bottom: 10px;
            text-align: left;
            color: #33ff33;
            text-shadow: 0 0 5px #33ff33;
        }

        .score-board {
            display: flex;
            justify-content: space-around;
            margin-bottom: 15px;
            font-size: 1.8em;
            color: #33ff33;
            text-shadow: 0 0 5px #33ff33;
        }

        .score-item {
            background: #002200;
            color: #33ff33;
            padding: 10px 20px;
            border: 2px solid #33ff33;
            font-weight: bold;
            box-shadow: 
                0 0 10px rgba(51, 255, 51, 0.3),
                inset 0 0 10px rgba(51, 255, 51, 0.1);
        }

        #gameCanvas {
            border: 3px solid #33ff33;
            background: #000000;
            display: block;
            margin: 0 auto 15px;
            box-shadow: 
                0 0 20px rgba(51, 255, 51, 0.4),
                inset 0 0 30px rgba(0, 0, 0, 0.8);
        }

        .controls {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-bottom: 15px;
            flex-wrap: wrap;
        }

        button {
            background: #002200;
            color: #33ff33;
            border: 2px solid #33ff33;
            padding: 10px 20px;
            font-size: 1.5em;
            font-family: 'VT323', monospace;
            cursor: pointer;
            transition: all 0.1s ease;
            box-shadow: 
                0 0 10px rgba(51, 255, 51, 0.3),
                inset 0 0 5px rgba(51, 255, 51, 0.1);
            text-shadow: 0 0 5px #33ff33;
        }

        button:hover {
            background: #003300;
            box-shadow: 
                0 0 20px rgba(51, 255, 51, 0.6),
                inset 0 0 10px rgba(51, 255, 51, 0.2);
        }

        button:active {
            background: #004400;
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .difficulty-selector {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-bottom: 15px;
        }

        .difficulty-btn {
            padding: 8px 16px;
            font-size: 1.3em;
        }

        .difficulty-btn.active {
            background: #004400;
            box-shadow: 
                0 0 20px rgba(51, 255, 51, 0.6),
                inset 0 0 15px rgba(51, 255, 51, 0.3);
        }

        .instructions {
            background: #001100;
            padding: 15px;
            border: 2px solid #33ff33;
            margin-top: 15px;
            text-align: left;
            color: #33ff33;
            line-height: 1.8;
            font-size: 1.3em;
            text-shadow: 0 0 5px #33ff33;
            box-shadow: 
                0 0 10px rgba(51, 255, 51, 0.2),
                inset 0 0 10px rgba(0, 0, 0, 0.5);
        }

        .instructions h3 {
            color: #33ff33;
            margin-bottom: 10px;
            font-size: 1.5em;
            text-shadow: 0 0 10px #33ff33;
        }

        .instructions ul {
            list-style: none;
            padding-left: 20px;
        }

        .instructions li::before {
            content: "> ";
            color: #33ff33;
        }

        .game-over {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: #000000;
            padding: 40px;
            border: 4px solid #33ff33;
            box-shadow: 
                0 0 40px rgba(51, 255, 51, 0.6),
                inset 0 0 30px rgba(0, 0, 0, 0.8);
            text-align: center;
            display: none;
            z-index: 1001;
        }

        .game-over.show {
            display: block;
            animation: terminalBlink 0.5s ease;
        }

        @keyframes terminalBlink {
            0%, 50%, 100% { opacity: 1; }
            25%, 75% { opacity: 0.5; }
        }

        .game-over h2 {
            color: #33ff33;
            margin-bottom: 20px;
            font-size: 3em;
            text-shadow: 
                0 0 10px #33ff33,
                0 0 20px #33ff33,
                0 0 30px #33ff33;
            animation: glow 1s ease-in-out infinite alternate;
        }

        .game-over p {
            font-size: 2em;
            margin-bottom: 20px;
            color: #33ff33;
            text-shadow: 0 0 10px #33ff33;
        }

        .cursor {
            display: inline-block;
            width: 10px;
            height: 20px;
            background: #33ff33;
            animation: blink 1s step-end infinite;
        }

        @keyframes blink {
            0%, 50% { opacity: 1; }
            51%, 100% { opacity: 0; }
        }

        @media (max-width: 600px) {
            h1 {
                font-size: 2em;
            }

            .score-board {
                font-size: 1.3em;
            }

            #gameCanvas {
                max-width: 100%;
            }

            .controls {
                flex-direction: column;
            }

            button {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="terminal-container">
        <div class="boot-text">> APPLE ][ SYSTEM INITIALIZED</div>
        <div class="boot-text">> LOADING SNAKE.BAS...</div>
        <div class="boot-text">> READY.<span class="cursor"></span></div>
        
        <h1>*** SNAKE ***</h1>
        
        <div class="score-board">
            <div class="score-item">
                <span>SCORE: </span><span id="score">0000</span>
            </div>
            <div class="score-item">
                <span>HI-SCORE: </span><span id="highScore">0000</span>
            </div>
        </div>

        <div class="difficulty-selector">
            <button class="difficulty-btn" onclick="setDifficulty('easy')">EASY</button>
            <button class="difficulty-btn active" onclick="setDifficulty('medium')">NORMAL</button>
            <button class="difficulty-btn" onclick="setDifficulty('hard')">HARD</button>
        </div>

        <canvas id="gameCanvas" width="400" height="400"></canvas>

        <div class="controls">
            <button onclick="startGame()" id="startBtn">[START]</button>
            <button onclick="pauseGame()" id="pauseBtn" disabled>[PAUSE]</button>
            <button onclick="resetGame()" id="resetBtn">[RESET]</button>
        </div>

        <div class="instructions">
            <h3>*** INSTRUCTIONS ***</h3>
            <ul>
                <li>USE ARROW KEYS TO MOVE</li>
                <li>EAT FOOD TO GROW</li>
                <li>AVOID WALLS AND SELF</li>
                <li>SELECT DIFFICULTY LEVEL</li>
            </ul>
        </div>
    </div>

    <div class="game-over" id="gameOverScreen">
        <h2>*** GAME OVER ***</h2>
        <p>FINAL SCORE: <span id="finalScore"></span></p>
        <button onclick="resetGame()">[PRESS TO CONTINUE]</button>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreElement = document.getElementById('score');
        const highScoreElement = document.getElementById('highScore');
        const gameOverScreen = document.getElementById('gameOverScreen');
        const finalScoreElement = document.getElementById('finalScore');
        const startBtn = document.getElementById('startBtn');
        const pauseBtn = document.getElementById('pauseBtn');

        const gridSize = 20;
        const tileCount = canvas.width / gridSize;

        let snake = [{x: 10, y: 10}];
        let food = {x: 15, y: 15};
        let dx = 0;
        let dy = 0;
        let score = 0;
        let highScore = localStorage.getItem('snakeHighScore') || 0;
        let gameLoop;
        let isGameRunning = false;
        let isPaused = false;
        let gameSpeed = 100;
        let difficulty = 'medium';

        // Format score display
        highScoreElement.textContent = String(highScore).padStart(4, '0');

        const difficulties = {
            easy: 150,
            medium: 100,
            hard: 50
        };

        function setDifficulty(level) {
            if (isGameRunning) return;
            
            difficulty = level;
            gameSpeed = difficulties[level];
            
            document.querySelectorAll('.difficulty-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            event.target.classList.add('active');
        }

        function drawGame() {
            clearCanvas();
            moveSnake();
            drawSnake();
            drawFood();
            checkCollision();
            checkFoodCollision();
        }

        function clearCanvas() {
            // Terminal black background
            ctx.fillStyle = '#000000';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // Draw terminal grid
            ctx.strokeStyle = '#002200';
            ctx.lineWidth = 1;
            for (let i = 0; i <= tileCount; i++) {
                ctx.beginPath();
                ctx.moveTo(i * gridSize, 0);
                ctx.lineTo(i * gridSize, canvas.height);
                ctx.stroke();
                
                ctx.beginPath();
                ctx.moveTo(0, i * gridSize);
                ctx.lineTo(canvas.width, i * gridSize);
                ctx.stroke();
            }
        }

        function drawSnake() {
            snake.forEach((segment, index) => {
                // Apple II green phosphor effect
                ctx.fillStyle = '#33ff33';
                ctx.shadowColor = '#33ff33';
                ctx.shadowBlur = 10;
                
                // Draw block with slight inset for retro look
                ctx.fillRect(
                    segment.x * gridSize + 2,
                    segment.y * gridSize + 2,
                    gridSize - 4,
                    gridSize - 4
                );
                
                // Add highlight for CRT effect
                if (index === 0) {
                    ctx.fillStyle = '#66ff66';
                    ctx.fillRect(
                        segment.x * gridSize + 4,
                        segment.y * gridSize + 4,
                        gridSize - 12,
                        gridSize - 12
                    );
                }
                
                ctx.shadowBlur = 0;
            });
        }

        function drawFood() {
            // Blinking food effect
            const blink = Math.floor(Date.now() / 200) % 2;
            ctx.fillStyle = blink ? '#33ff33' : '#66ff66';
            ctx.shadowColor = '#33ff33';
            ctx.shadowBlur = 15;
            
            // Draw as square block for retro terminal look
            ctx.fillRect(
                food.x * gridSize + 2,
                food.y * gridSize + 2,
                gridSize - 4,
                gridSize - 4
            );
            
            // Add blinking border
            if (blink) {
                ctx.strokeStyle = '#99ff99';
                ctx.lineWidth = 2;
                ctx.strokeRect(
                    food.x * gridSize + 1,
                    food.y * gridSize + 1,
                    gridSize - 2,
                    gridSize - 2
                );
            }
            
            ctx.shadowBlur = 0;
        }

        function moveSnake() {
            if (dx === 0 && dy === 0) return;

            const head = {x: snake[0].x + dx, y: snake[0].y + dy};
            snake.unshift(head);
            
            if (head.x === food.x && head.y === food.y) {
                score++;
                scoreElement.textContent = String(score).padStart(4, '0');
                generateFood();
                
                if (score > highScore) {
                    highScore = score;
                    highScoreElement.textContent = String(highScore).padStart(4, '0');
                    localStorage.setItem('snakeHighScore', highScore);
                }
            } else {
                snake.pop();
            }
        }

        function generateFood() {
            let newFood;
            do {
                newFood = {
                    x: Math.floor(Math.random() * tileCount),
                    y: Math.floor(Math.random() * tileCount)
                };
            } while (snake.some(segment => segment.x === newFood.x && segment.y === newFood.y));
            
            food = newFood;
        }

        function checkCollision() {
            const head = snake[0];
            
            // Wall collision
            if (head.x < 0 || head.x >= tileCount || head.y < 0 || head.y >= tileCount) {
                gameOver();
                return;
            }
            
            // Self collision
            for (let i = 1; i < snake.length; i++) {
                if (head.x === snake[i].x && head.y === snake[i].y) {
                    gameOver();
                    return;
                }
            }
        }

        function checkFoodCollision() {
            const head = snake[0];
            return head.x === food.x && head.y === food.y;
        }

        function startGame() {
            if (isGameRunning && !isPaused) return;
            
            if (!isGameRunning) {
                snake = [{x: 10, y: 10}];
                dx = 1;
                dy = 0;
                score = 0;
                scoreElement.textContent = String(score).padStart(4, '0');
                generateFood();
            }
            
            isGameRunning = true;
            isPaused = false;
            startBtn.disabled = true;
            pauseBtn.disabled = false;
            gameOverScreen.classList.remove('show');
            
            if (gameLoop) clearInterval(gameLoop);
            gameLoop = setInterval(drawGame, gameSpeed);
        }

        function pauseGame() {
            if (!isGameRunning) return;
            
            isPaused = !isPaused;
            
            if (isPaused) {
                clearInterval(gameLoop);
                pauseBtn.textContent = '[RESUME]';
            } else {
                gameLoop = setInterval(drawGame, gameSpeed);
                pauseBtn.textContent = '[PAUSE]';
            }
        }

        function resetGame() {
            clearInterval(gameLoop);
            snake = [{x: 10, y: 10}];
            dx = 0;
            dy = 0;
            score = 0;
            scoreElement.textContent = String(score).padStart(4, '0');
            isGameRunning = false;
            isPaused = false;
            startBtn.disabled = false;
            pauseBtn.disabled = true;
            pauseBtn.textContent = '[PAUSE]';
            gameOverScreen.classList.remove('show');
            generateFood();
            drawGame();
        }

        function gameOver() {
            clearInterval(gameLoop);
            isGameRunning = false;
            startBtn.disabled = false;
            pauseBtn.disabled = true;
            finalScoreElement.textContent = String(score).padStart(4, '0');
            gameOverScreen.classList.add('show');
        }

        document.addEventListener('keydown', (e) => {
            if (!isGameRunning || isPaused) return;
            
            switch(e.key) {
                case 'ArrowUp':
                    if (dy === 0) { dx = 0; dy = -1; }
                    e.preventDefault();
                    break;
                case 'ArrowDown':
                    if (dy === 0) { dx = 0; dy = 1; }
                    e.preventDefault();
                    break;
                case 'ArrowLeft':
                    if (dx === 0) { dx = -1; dy = 0; }
                    e.preventDefault();
                    break;
                case 'ArrowRight':
                    if (dx === 0) { dx = 1; dy = 0; }
                    e.preventDefault();
                    break;
            }
        });

        // Initialize game
        generateFood();
        drawGame();
    </script>
</body>
</html>
