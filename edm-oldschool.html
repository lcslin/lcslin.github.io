<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-RBQ6L42E6H"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());

      gtag('config', 'G-RBQ6L42E6H');
    </script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>老派EDM沒有神器</title>
    
    <!-- 引入 CDN 函式庫 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tinymce/6.8.3/tinymce.min.js" referrerpolicy="origin"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/localforage/1.10.0/localforage.min.js"></script>
    
    <!-- Webfonts (Vogue Aesthetic) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@700;900&family=Helvetica+Neue:wght@400;500&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <div id="sidebar">
        <h2>老派 EDM 沒有神器<br><span style="font-size: 0.45em; color: #999; font-family: var(--font-ui); font-weight: normal; letter-spacing: 0;">Design for EDM OG, the Oldschool Edition</span></h2>
        
        <div class="control-group">
            <h3>基礎版型範本</h3>
            <button class="template-btn" data-type="seminar">研討會/論壇</button>
            <button class="template-btn" data-type="mission">拓銷團</button>
            <button class="template-btn" data-type="expo">展覽</button>
            <button class="template-btn" data-type="course">訓練課程</button>
            <button class="template-btn" data-type="newsletter">電子報 (VERSE 風格)</button>
        </div>
        
        <div class="control-group" style="flex-grow: 1;">
            <h3>所有編輯，只留存於您的瀏覽器中</h3>
            <div id="saved-list">
                <!-- Drafts will be injected here -->
            </div>
        </div>
        
        <div style="margin-top: 20px;">
            <p style="font-size: 13px; color: #555; line-height: 1.5; margin: 0 0 10px 0;">請打包下載，再上傳到 EDM 系統的「行銷範本」功能中，進行後續使用。</p>
            <button class="action-btn" id="btn-export">匯出EDM封包</button>
        </div>

        <div style="margin-top: 30px; font-size: 12px; color: #666; border-top: 1px dashed #ccc; padding-top: 15px; line-height: 1.6; text-align: left;">
            作為 EDM 系統補強，相關問題請 <a href="msteams://teams.microsoft.com/l/chat/0/0?users=cslin@taitra.org.tw" style="color: var(--primary); font-weight: bold; text-decoration: underline;">按此處</a> 聯繫作者。
        </div>
    </div>

    <div id="main-area">
        
        <div class="meta-header">
            <div class="meta-row">
                <label>信件主旨</label>
                <input type="text" id="meta-subject" placeholder="輸入信件主旨與預覽摘要...">
            </div>
            <div>
                <button id="btn-save" class="action-btn" style="padding: 10px 25px;">儲存</button>
            </div>
        </div>

        <div id="canvas-wrapper">
            <div id="edm-canvas">
                <div class="empty-state">
                    尚未建立內容。<br>請從左側選擇版型範本，或建立全新區塊。
                </div>
            </div>
            
            <div id="add-block-container">
                <button id="btn-add-block">新增區塊</button>
            </div>

            <!-- Block Management Controls -->
            <div id="block-float-bar">
                <button id="btn-move-up" title="上移">↑</button>
                <button id="btn-move-down" title="下移">↓</button>
                <button id="btn-delete-block" title="刪除區塊" style="color: red;">×</button>
            </div>

            <!-- Image Replacement Float -->
            <div id="img-float-bar">
                <button id="btn-replace-img">更換圖片 (或貼上)</button>
            </div>
            <input type="file" id="hidden-image-upload" style="display:none;" accept=".png, .jpg, .jpeg, .gif">
        </div>
    </div>

    <!-- Modal for adding blocks -->
    <div id="modal-add-block">
        <div class="modal-content">
            <h3 class="heading-font" style="font-size: 20px; border-bottom: 1px solid #111; padding-bottom: 15px;">選擇要插入的區塊</h3>
            <div class="block-grid">
                <button class="insert-block-btn" data-block="header">大標題區塊</button>
                <button class="insert-block-btn" data-block="hero">滿版主視覺</button>
                <button class="insert-block-btn" data-block="text">純文字段落</button>
                <button class="insert-block-btn" data-block="split">雙欄圖文</button>
                <button class="insert-block-btn" data-block="button">行動呼籲按鈕</button>
                <button class="insert-block-btn" data-block="spacer">空白間距</button>
            </div>
            <button class="close-modal" onclick="document.getElementById('modal-add-block').style.display='none'">取消</button>
        </div>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
